services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        UID: 1000
        GID: 1000
    container_name: ecoshop_app
    volumes:
      - ../src:/var/www
    working_dir: /var/www
    depends_on:
    - db
    networks:
    - ecoshop_net

  web:
    image: nginx:alpine
    container_name: ecoshop_nginx
    ports: 
    - "8002:80"
    volumes:
    - ../src:/var/www
    - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
    - app
    networks:
    - ecoshop_net

  db:
    image: postgres:17
    container_name: ecoshop_db
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    volumes:
    - ecoshop_pgdata:/var/lib/postgresql/data
    ports:
    - "5434:5432"
    networks:
    - ecoshop_net
  pgadmin:
    image: dpage/pgadmin4
    container_name: ecoshop_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
    - "5053:80"
    depends_on:
    - db
    networks:
    - ecoshop_net

networks:
  ecoshop_net:
volumes:
  ecoshop_pgdata: